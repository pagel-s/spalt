name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc-9, gcc-10, gcc-11, clang-12, clang-13]
        build-type: [Debug, Release]
        exclude:
          # Skip some combinations to speed up CI
          - compiler: gcc-10
            build-type: Debug
          - compiler: gcc-11
            build-type: Debug
          - compiler: clang-12
            build-type: Debug
          - compiler: clang-13
            build-type: Debug

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: "3.10"

    - name: Set up build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libeigen3-dev \
          libboost-all-dev

    - name: Install RDKit
      shell: bash -el {0}
      run: |
        conda install -c conda-forge rdkit -y

    - name: Install Open3D
      shell: bash -el {0}
      run: |
        pip install open3d

    - name: Install MSMS (optional)
      run: |
        sudo apt-get install -y msms || echo "MSMS not available, will use fallback"

    - name: Configure CMake
      shell: bash -el {0}
      run: |
        mkdir build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
          -DCMAKE_CXX_COMPILER=${{ matrix.compiler }} \
          -DCMAKE_CXX_STANDARD=17

    - name: Build
      run: |
        cd build
        make -j$(nproc)

    - name: Test
      run: |
        cd build
        ctest --output-on-failure --parallel $(nproc)

    - name: Generate coverage report
      if: matrix.build-type == 'Debug' && matrix.compiler == 'gcc-11'
      run: |
        cd build
        # Install gcov if not available
        sudo apt-get install -y gcov
        # Generate coverage
        ctest --output-on-failure
        # Coverage would be generated here if gcov is set up
        echo "Coverage report generation placeholder"

  code-quality:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: "3.10"

    - name: Set up build environment
      shell: bash -el {0}
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          clang-format \
          clang-tidy \
          cppcheck \
          libeigen3-dev \
          libboost-all-dev
        conda install -c conda-forge rdkit -y
        pip install open3d

    - name: Code formatting check
      run: |
        find src/ tests/ -name "*.cpp" -o -name "*.h" | xargs clang-format --dry-run --Werror

    - name: Static analysis
      shell: bash -el {0}
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Debug
        make -j$(nproc)
        # Run clang-tidy on source files
        find ../src -name "*.cpp" | xargs clang-tidy -p build/

  documentation:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: "3.10"

    - name: Set up build environment
      shell: bash -el {0}
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          doxygen \
          graphviz \
          libeigen3-dev \
          libboost-all-dev
        conda install -c conda-forge rdkit -y
        pip install open3d

    - name: Generate documentation
      shell: bash -el {0}
      run: |
        mkdir build
        cd build
        cmake .. -DBUILD_DOCUMENTATION=ON
        make docs

    - name: Deploy documentation
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./build/docs/html
        destination_dir: docs

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
